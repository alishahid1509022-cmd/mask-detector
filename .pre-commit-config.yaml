repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=10000"]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        # numpy is listed here (pinned the same as requirements.txt) so this
        # hook's isolated environment actually type-checks numpy-typed calls
        # instead of silently treating them as Any via --ignore-missing-imports.
        additional_dependencies: ["types-Pillow", "numpy>=1.26,<2.5"]
        args: ["--ignore-missing-imports"]
        files: ^src/
